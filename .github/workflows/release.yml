name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          version="${version#v}"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
      - name: Build deployment bundle
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          package="agent-remote-deploy-${version}"
          mkdir -p "dist/${package}"
          cp -R deploy docs README.md README.zh-CN.md CHANGELOG.md LICENSE THIRD_PARTY_NOTICES.md "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
      - uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: dist/*.tar.gz
