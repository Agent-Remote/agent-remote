name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate compose bundle
        run: docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml config --quiet

