name: prepare-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Normalize version
        id: version
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: ${{ inputs.version }}" >&2
            exit 2
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists" >&2
            exit 1
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"
      - name: Prepare version files
        run: scripts/prepare-release.sh "${{ steps.version.outputs.value }}"
      - uses: docker/setup-buildx-action@v3
      - name: Validate compose bundle
        run: docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml config --quiet
      - name: Commit and tag
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add docs/deployment.md
            git commit -m "chore: release v${version}"
          fi
          git tag "v${version}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${version}"
          gh workflow run release.yml --ref main -f version="${version}"
        env:
          GH_TOKEN: ${{ github.token }}
